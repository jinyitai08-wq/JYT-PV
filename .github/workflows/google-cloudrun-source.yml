name: Build and Deploy to Cloud Run

on:
  push:
    branches:
      - main  # 當程式推送到 main 分支時觸發

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # 1. 認證 Google Cloud
    - id: 'auth'
      uses: 'google-github-actions/auth@v2'
      with:
        credentials_json: '${{ secrets.GCP_SA_KEY }}'

    # 2. 設定 GCP SDK
    - name: 'Set up Cloud SDK'
      uses: 'google-github-actions/setup-gcloud@v2'

    # 3. 授權 Docker 推送到 Google Container Registry
    - name: 'Configure Docker'
      run: |-
        gcloud auth configure-docker --quiet

    # 4. 建立 Docker 映像檔並推送到 GCP
    - name: 'Build and Push Container'
      run: |-
        docker build -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/my-python-app:${{ github.sha }} .
        docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/my-python-app:${{ github.sha }}

    # 5. 部署到 Cloud Run
    - name: 'Deploy to Cloud Run'
      uses: 'google-github-actions/deploy-cloudrun@v2'
      with:
        service: 'my-python-app'
        image: 'gcr.io/${{ secrets.GCP_PROJECT_ID }}/my-python-app:${{ github.sha }}'
        region: 'asia-east1' # 台灣機房
        flags: '--allow-unauthenticated' # 允許公開存取
